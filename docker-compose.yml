version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: examed_postgres
    environment:
      POSTGRES_DB: examed
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: examed_secure_2024
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d examed"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: examed_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: examed_backend
    environment:
      DATABASE_URL: postgresql://admin:examed_secure_2024@postgres:5432/examed
      REDIS_URL: redis://redis:6379
      JWT_SECRET: jwt_secret_examed_2024_very_long_key
      JWT_REFRESH_SECRET: jwt_refresh_secret_examed_2024
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PDF_PARSER_URL: http://pdf-parser:8000
      UPLOAD_PATH: /app/uploads
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  pdf-parser:
    build:
      context: ./pdf-parser
      dockerfile: Dockerfile
    container_name: examed_pdf_parser
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: examed_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
